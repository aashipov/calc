# mkdir -p /tmp/log/nginx/ 

worker_processes auto;
error_log /tmp/log/nginx/error.log;
pid /tmp/nginx.pid;

events {
    worker_connections 100000;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /tmp/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    upstream be {
        least_conn;
        server 127.0.0.1:8081 max_fails=1 fail_timeout=2s;
        server 127.0.0.1:8082 max_fails=1 fail_timeout=2s;
        server 127.0.0.1:8083 max_fails=1 fail_timeout=2s;
        server 127.0.0.1:8084 max_fails=1 fail_timeout=2s;
    }

    server {
        listen 8080;
        server_name _;

        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;

        location / {
            proxy_pass http://be;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
