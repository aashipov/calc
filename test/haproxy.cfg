global
    maxconn 100000
    tune.maxaccept -1

defaults
    mode http
    timeout connect 5000ms
    timeout client 5000ms
    timeout server 5000ms
    option http-server-close
    option redispatch
    retries 3

frontend stats
    mode http
    bind 0.0.0.0:8181
    stats enable
    stats uri /stats
    stats refresh 10s

frontend fe
    bind 0.0.0.0:8080
    default_backend be

backend be
    balance leastconn
    option nolinger
    http-reuse safe
    server b1 0.0.0.0:8081 check inter 2000ms rise 2 fall 1
    server b2 0.0.0.0:8082 check inter 2000ms rise 2 fall 1
    server b3 0.0.0.0:8083 check inter 2000ms rise 2 fall 1
    server b4 0.0.0.0:8084 check inter 2000ms rise 2 fall 1
